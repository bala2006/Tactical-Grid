name: CI

# Runs the static analysis + test safety net on every push and pull request so the
# content-parity / balance-invariant guards (test/) can never silently regress.
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  analyze-and-test:
    name: Analyze & test (Flutter)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  build-apk:
    name: Build debug APK (native engine compiles)
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Confirms the C++/NDK engine still compiles and links.
      - name: Build debug APK
        run: flutter build apk --debug
